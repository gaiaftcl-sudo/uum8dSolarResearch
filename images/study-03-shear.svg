<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Helvetica,Arial,sans-serif"><rect width="960" height="480" fill="#ffffff"/><text x="480" y="34" font-size="22" font-weight="bold" fill="#111" text-anchor="middle">The shear — a flare steps with the clock; a storm ramps without one</text><text x="480" y="56" font-size="14" fill="#555" text-anchor="middle">same active region AR 10486 · X17 flare 2003-10-28 11:10 UT vs Halloween superstorm 2003-10-29→31 (Dst −353 / −383 nT)</text><text x="250" y="86" font-size="15" font-weight="bold" fill="#4f46e5" text-anchor="middle">TRUE FORCING — X17 flare TEC step</text><line x1="60" y1="330" x2="440" y2="330" stroke="#e5e7eb"/><line x1="60" y1="250" x2="440" y2="250" stroke="#e5e7eb"/><line x1="60" y1="210" x2="440" y2="210" stroke="#4f46e5" stroke-dasharray="3,3" opacity="0.6"/><text x="54" y="334" font-size="11" fill="#555" text-anchor="end">+10</text><text x="54" y="254" font-size="11" fill="#555" text-anchor="end">+20</text><text x="54" y="214" font-size="11" font-weight="bold" fill="#4f46e5" text-anchor="end">+25 TECU</text><line x1="60" y1="410" x2="440" y2="410" stroke="#333"/><text x="60" y="428" font-size="11" fill="#555" text-anchor="middle">T−15</text><text x="89" y="428" font-size="11" fill="#555" text-anchor="middle">T</text><text x="206" y="428" font-size="11" fill="#555" text-anchor="middle">+60</text><text x="323" y="428" font-size="11" fill="#555" text-anchor="middle">+120</text><text x="440" y="428" font-size="11" fill="#555" text-anchor="middle">+180 min</text><line x1="89" y1="100" x2="89" y2="410" stroke="#4f46e5" stroke-dasharray="4,3"/><text x="93" y="110" font-size="12" font-weight="bold" fill="#4f46e5">GOES peak 11:10 UT</text><text x="93" y="126" font-size="11" fill="#555">step in first 5-min epoch ≥ T</text><polyline points="60,410 89,410 94,284 99,237 109,213 128,210 206,250 323,298 440,330" fill="none" stroke="#4f46e5" stroke-width="2.5"/><text x="150" y="240" font-size="11" fill="#333">1/e rise 2.5 min</text><text x="300" y="280" font-size="11" fill="#333">holds ~3 h, decays with flare</text><line x1="60" y1="406" x2="440" y2="406" stroke="#333" stroke-dasharray="5,4"/><text x="360" y="398" font-size="11" fill="#333" text-anchor="middle">χ&gt;100° night: 0 — silent</text><text x="250" y="375" font-size="11" fill="#333" text-anchor="middle">sunlit cap only (χ&lt;80°), ordered ~cos χ</text><text x="730" y="86" font-size="15" font-weight="bold" fill="#dc2626" text-anchor="middle">ADVERSARY — CME storm TEC ramp</text><line x1="530" y1="330" x2="930" y2="330" stroke="#e5e7eb"/><line x1="530" y1="250" x2="930" y2="250" stroke="#e5e7eb"/><text x="524" y="334" font-size="11" fill="#555" text-anchor="end">+100%</text><text x="524" y="254" font-size="11" fill="#555" text-anchor="end">+200%</text><line x1="530" y1="410" x2="930" y2="410" stroke="#333"/><text x="530" y="428" font-size="11" fill="#555" text-anchor="middle">0</text><text x="630" y="428" font-size="11" fill="#555" text-anchor="middle">+12</text><text x="730" y="428" font-size="11" fill="#555" text-anchor="middle">+24</text><text x="830" y="428" font-size="11" fill="#555" text-anchor="middle">+36</text><text x="930" y="428" font-size="11" fill="#555" text-anchor="middle">+48 h</text><line x1="688" y1="100" x2="688" y2="410" stroke="#dc2626" stroke-dasharray="4,3"/><text x="692" y="110" font-size="12" font-weight="bold" fill="#dc2626">CME/shock +19 h</text><text x="692" y="126" font-size="11" fill="#555">~06:00 UT Oct 29 — no X-ray step</text><text x="536" y="150" font-size="11" fill="#333">hours-long ramp, day AND night</text><text x="536" y="166" font-size="11" fill="#333">Dst → −353 / −383 nT (Oct 30)</text><polyline points="530,410 688,410 720,340 755,265 790,228 830,242 870,236 930,248" fill="none" stroke="#dc2626" stroke-width="2.5"/><text x="800" y="215" font-size="11" fill="#dc2626" text-anchor="middle">dayside &gt;200% (Mannucci 2005)</text><polyline points="530,410 688,410 735,365 780,315 830,300 880,306 930,310" fill="none" stroke="#fca5a5" stroke-width="2.5"/><text x="845" y="288" font-size="11" fill="#dc2626" text-anchor="middle">night rises too — storm is global</text><text x="480" y="460" font-size="12" font-weight="bold" fill="#333" text-anchor="middle">THE LOCK — clock: flare lags the X-ray peak ~0 min, the storm +19 h with no X-ray step · cap: flare sunlit-only, storm global · shape: minutes-step vs hours-ramp</text></svg>
