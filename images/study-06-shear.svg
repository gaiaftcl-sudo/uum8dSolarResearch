<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Helvetica,Arial,sans-serif"><rect width="960" height="480" fill="#ffffff"/><text x="480" y="34" font-size="22" font-weight="bold" fill="#111" text-anchor="middle">Study 06 — Shear: the ladder-rider vs the Lg-flooder</text><text x="480" y="56" font-size="14" fill="#555" text-anchor="middle">Same station (IC.MDJ, Δ ≈ 370 km), same windows cut from the catalog clock — magnitude copied, shape betrayed</text><rect x="60" y="124" width="400" height="266" fill="none" stroke="#e5e7eb"/><rect x="500" y="124" width="400" height="266" fill="none" stroke="#e5e7eb"/><text x="260" y="84" font-size="13" font-weight="bold" fill="#4f46e5" text-anchor="middle">TRUE — DPRK test 6, announced explosion</text><text x="260" y="100" font-size="12" fill="#4f46e5" text-anchor="middle">2017-09-03 03:30:01.760 UTC — mb 6.3, depth 0</text><text x="260" y="115" font-size="11" fill="#4f46e5" text-anchor="middle">rides the ladder: zero free parameters</text><text x="700" y="84" font-size="13" font-weight="bold" fill="#dc2626" text-anchor="middle">MIMIC — same-site earthquake</text><text x="700" y="100" font-size="12" fill="#dc2626" text-anchor="middle">2017-09-23 08:29:16.810 UTC — ml 3.6, depth 5 km</text><text x="700" y="115" font-size="11" fill="#dc2626" text-anchor="middle">CEA: suspected explosion — then reversed</text><rect x="178" y="150" width="24" height="210" fill="#e5e7eb" fill-opacity="0.6" stroke="#555" stroke-dasharray="3,3"/><rect x="317" y="150" width="31" height="210" fill="#e5e7eb" fill-opacity="0.6" stroke="#555" stroke-dasharray="3,3"/><line x1="263" y1="150" x2="263" y2="360" stroke="#555" stroke-dasharray="2,4"/><text x="190" y="144" font-size="10" fill="#555" text-anchor="middle">P [44,54] s</text><text x="263" y="144" font-size="10" fill="#555" text-anchor="middle">Sn 80 s</text><text x="332" y="144" font-size="10" fill="#555" text-anchor="middle">Lg [103,116] s</text><rect x="181" y="190" width="18" height="170" fill="#4f46e5"/><text x="190" y="182" font-size="11" fill="#4f46e5" text-anchor="middle">ΣP² LARGE</text><rect x="322" y="350" width="21" height="10" fill="#a5b4fc"/><text x="332" y="340" font-size="11" fill="#4f46e5" text-anchor="middle">ΣLg² starved</text><line x1="75" y1="360" x2="451" y2="360" stroke="#333" stroke-width="1.5"/><text x="75" y="376" font-size="10" fill="#555" text-anchor="middle">0</text><text x="169" y="376" font-size="10" fill="#555" text-anchor="middle">40</text><text x="263" y="376" font-size="10" fill="#555" text-anchor="middle">80</text><text x="357" y="376" font-size="10" fill="#555" text-anchor="middle">120</text><text x="451" y="376" font-size="10" fill="#555" text-anchor="middle">160 s</text><text x="260" y="404" font-size="12" fill="#4f46e5" text-anchor="middle">P:Lg bucket m above sealed threshold → explosion-side</text><rect x="618" y="150" width="24" height="210" fill="#e5e7eb" fill-opacity="0.6" stroke="#555" stroke-dasharray="3,3"/><rect x="757" y="150" width="31" height="210" fill="#e5e7eb" fill-opacity="0.6" stroke="#555" stroke-dasharray="3,3"/><line x1="703" y1="150" x2="703" y2="360" stroke="#555" stroke-dasharray="2,4"/><text x="630" y="144" font-size="10" fill="#555" text-anchor="middle">P [44,54] s</text><text x="703" y="144" font-size="10" fill="#555" text-anchor="middle">Sn 80 s</text><text x="772" y="144" font-size="10" fill="#555" text-anchor="middle">Lg [103,116] s</text><rect x="621" y="320" width="18" height="40" fill="#fca5a5"/><text x="630" y="312" font-size="11" fill="#dc2626" text-anchor="middle">ΣP² weak</text><rect x="761" y="180" width="21" height="180" fill="#dc2626"/><text x="771" y="172" font-size="11" fill="#dc2626" text-anchor="middle">ΣLg² FLOODS</text><rect x="645" y="300" width="30" height="60" fill="none" stroke="#dc2626" stroke-dasharray="4,3"/><text x="680" y="292" font-size="10" fill="#dc2626" text-anchor="start">ripple-fired blast: P leaks past 54 s</text><line x1="515" y1="360" x2="891" y2="360" stroke="#333" stroke-width="1.5"/><text x="515" y="376" font-size="10" fill="#555" text-anchor="middle">0</text><text x="609" y="376" font-size="10" fill="#555" text-anchor="middle">40</text><text x="703" y="376" font-size="10" fill="#555" text-anchor="middle">80</text><text x="797" y="376" font-size="10" fill="#555" text-anchor="middle">120</text><text x="891" y="376" font-size="10" fill="#555" text-anchor="middle">160 s</text><text x="700" y="404" font-size="12" fill="#dc2626" text-anchor="middle">bucket m small, below threshold → earthquake-side</text><text x="480" y="432" font-size="13" font-weight="bold" fill="#111" text-anchor="middle">THE SHAPE LOCK — confinement to a depth-0 point ladder</text><text x="480" y="450" font-size="12" fill="#333" text-anchor="middle">a quake cannot starve its own shear (Lg floods); a seconds-long delay-fired blast cannot fit a 10 ms point in time (P leaks)</text><text x="480" y="468" font-size="11" fill="#555" text-anchor="middle">both classes carry catalog-fitted clocks — the ±30 s jitter control runs on both sides; the lag profile is published per (station × phase)</text></svg>
