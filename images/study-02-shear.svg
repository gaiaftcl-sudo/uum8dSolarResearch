<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 960 480' font-family='Helvetica,Arial,sans-serif'><rect x='0' y='0' width='960' height='480' fill='#ffffff'/><text x='480' y='34' font-size='22' font-weight='bold' fill='#111' text-anchor='middle'>Same magnitude, different shape: launch hole vs storm</text><text x='480' y='56' font-size='14' fill='#555' text-anchor='middle'>In-corridor vs +20°-longitude control, % of baseline — pointwise the dips match (2–70%); the shape cannot</text><text x='265' y='100' font-size='14' font-weight='bold' fill='#4f46e5' text-anchor='middle'>Launch hole — FORMOSAT-5, 2017-08-24 18:51 UTC</text><text x='265' y='117' font-size='11' fill='#555' text-anchor='middle'>~900 km hole on the published Vandenberg track</text><text x='715' y='100' font-size='14' font-weight='bold' fill='#dc2626' text-anchor='middle'>Storm — Gannon G5, SSC 2024-05-10 17:05 UT</text><text x='715' y='117' font-size='11' fill='#555' text-anchor='middle'>Kp 9, Dst −412 nT — continental depletion, no corridor</text><line x1='70' y1='200' x2='460' y2='200' stroke='#e5e7eb'/><line x1='70' y1='260' x2='460' y2='260' stroke='#e5e7eb'/><line x1='70' y1='320' x2='460' y2='320' stroke='#e5e7eb'/><line x1='70' y1='380' x2='460' y2='380' stroke='#e5e7eb'/><line x1='70' y1='140' x2='460' y2='140' stroke='#333' stroke-width='1'/><line x1='520' y1='200' x2='910' y2='200' stroke='#e5e7eb'/><line x1='520' y1='260' x2='910' y2='260' stroke='#e5e7eb'/><line x1='520' y1='320' x2='910' y2='320' stroke='#e5e7eb'/><line x1='520' y1='380' x2='910' y2='380' stroke='#e5e7eb'/><line x1='520' y1='140' x2='910' y2='140' stroke='#333' stroke-width='1'/><text x='62' y='144' font-size='10' fill='#555' text-anchor='end'>0</text><text x='62' y='204' font-size='10' fill='#555' text-anchor='end'>−20</text><text x='62' y='264' font-size='10' fill='#555' text-anchor='end'>−40</text><text x='62' y='324' font-size='10' fill='#555' text-anchor='end'>−60</text><text x='62' y='384' font-size='10' fill='#555' text-anchor='end'>−80</text><text x='512' y='144' font-size='10' fill='#555' text-anchor='end'>0</text><text x='512' y='204' font-size='10' fill='#555' text-anchor='end'>−20</text><text x='512' y='264' font-size='10' fill='#555' text-anchor='end'>−40</text><text x='512' y='324' font-size='10' fill='#555' text-anchor='end'>−60</text><text x='512' y='384' font-size='10' fill='#555' text-anchor='end'>−80</text><text x='70' y='396' font-size='10' fill='#555' text-anchor='middle'>0</text><text x='167' y='396' font-size='10' fill='#555' text-anchor='middle'>60</text><text x='265' y='396' font-size='10' fill='#555' text-anchor='middle'>120</text><text x='363' y='396' font-size='10' fill='#555' text-anchor='middle'>180</text><text x='460' y='396' font-size='10' fill='#555' text-anchor='middle'>240</text><text x='520' y='396' font-size='10' fill='#555' text-anchor='middle'>0</text><text x='617' y='396' font-size='10' fill='#555' text-anchor='middle'>60</text><text x='715' y='396' font-size='10' fill='#555' text-anchor='middle'>120</text><text x='813' y='396' font-size='10' fill='#555' text-anchor='middle'>180</text><text x='910' y='396' font-size='10' fill='#555' text-anchor='middle'>240</text><text x='265' y='411' font-size='11' fill='#555' text-anchor='middle'>minutes after t0 (5-min bins)</text><text x='715' y='411' font-size='11' fill='#555' text-anchor='middle'>minutes after SSC — no liftoff exists</text><text x='30' y='260' transform='rotate(-90 30 260)' font-size='11' fill='#555' text-anchor='middle'>TEC anomaly, % of baseline</text><rect x='78' y='140' width='138' height='240' fill='#a5b4fc' opacity='0.18'/><text x='147' y='374' font-size='10' fill='#4f46e5' text-anchor='middle'>bins +1..+18 (T+5–90)</text><line x1='363' y1='140' x2='363' y2='380' stroke='#16a34a' stroke-dasharray='5 4'/><text x='367' y='152' font-size='10' fill='#16a34a'>bin +36</text><text x='367' y='164' font-size='10' fill='#16a34a'>(T+180)</text><path d='M70,140 L78,140 L86,275 L94,350 L119,338 L168,290 L216,236 L265,194 L314,158 L338,140 L460,140' fill='none' stroke='#4f46e5' stroke-width='3'/><path d='M70,146 L168,137 L265,146 L363,134 L460,143' fill='none' stroke='#a5b4fc' stroke-width='2.5'/><text x='100' y='366' font-size='11' fill='#4f46e5'>−70% at T+15 (bin +3)</text><text x='190' y='130' font-size='10' fill='#555'>control +20° lon stays ≈ 0</text><text x='225' y='170' font-size='11' fill='#16a34a'>back to 0 by T+165</text><text x='225' y='183' font-size='11' fill='#16a34a'>recovery 2.5–3 h — passes</text><text x='265' y='315' font-size='12' font-weight='bold' fill='#4f46e5' text-anchor='middle'>large shear: corridor deep, control quiet</text><rect x='528' y='140' width='138' height='240' fill='#dc2626' opacity='0.08'/><text x='597' y='374' font-size='10' fill='#dc2626' text-anchor='middle'>bins +1..+18 (T+5–90)</text><line x1='813' y1='140' x2='813' y2='380' stroke='#16a34a' stroke-dasharray='5 4'/><text x='817' y='152' font-size='10' fill='#16a34a'>bin +36</text><text x='817' y='164' font-size='10' fill='#16a34a'>(T+180)</text><text x='817' y='177' font-size='10' fill='#dc2626'>still deep — fails</text><path d='M520,140 L536,164 L569,215 L618,236 L715,245 L813,242 L910,239' fill='none' stroke='#dc2626' stroke-width='3'/><path d='M520,143 L569,206 L618,230 L715,239 L910,233' fill='none' stroke='#fca5a5' stroke-width='2.5'/><text x='905' y='224' font-size='11' fill='#dc2626' text-anchor='end'>still −33% at T+240 — persists 18 h</text><text x='545' y='268' font-size='10' fill='#dc2626'>−20 to −25 TECu Europe; −35 TECu daytime, 18 h</text><text x='715' y='315' font-size='12' font-weight='bold' fill='#dc2626' text-anchor='middle'>shear ratio ~1: control floods with the corridor</text><text x='715' y='331' font-size='11' fill='#555' text-anchor='middle'>clock-locked to the SSC — no lag to any liftoff second</text><rect x='110' y='418' width='740' height='50' fill='#a5b4fc' opacity='0.15' stroke='#4f46e5' stroke-width='1'/><text x='480' y='438' font-size='12' font-weight='bold' fill='#111' text-anchor='middle'>The lock: onset in bins +1..+3 of a liftoff second published in advance, control quiet under U in every bin +1..+18,</text><text x='480' y='456' font-size='12' fill='#333' text-anchor='middle'>refill by bin +36 (T+180 min) — the storm fakes the magnitude, never all three shapes at once</text></svg>
