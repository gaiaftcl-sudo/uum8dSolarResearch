<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Helvetica,Arial,sans-serif"><rect width="960" height="480" fill="#ffffff"/><text x="480" y="34" font-size="22" font-weight="bold" fill="#111111" text-anchor="middle">Study 04 — The forcing clock: one origin second, one √(g·H) chart</text><text x="480" y="56" font-size="14" fill="#555555" text-anchor="middle">Three live-verified appointments from three ComCat origin seconds — each on the chart before the water moved</text><g stroke="#e5e7eb" stroke-width="1"><line x1="200" y1="100" x2="200" y2="400"/><line x1="300" y1="100" x2="300" y2="400"/><line x1="400" y1="100" x2="400" y2="400"/><line x1="500" y1="100" x2="500" y2="400"/><line x1="600" y1="100" x2="600" y2="400"/><line x1="700" y1="100" x2="700" y2="400"/><line x1="800" y1="100" x2="800" y2="400"/><line x1="900" y1="100" x2="900" y2="400"/><line x1="100" y1="350" x2="900" y2="350"/><line x1="100" y1="300" x2="900" y2="300"/><line x1="100" y1="250" x2="900" y2="250"/><line x1="100" y1="200" x2="900" y2="200"/><line x1="100" y1="150" x2="900" y2="150"/><line x1="100" y1="100" x2="900" y2="100"/></g><polygon points="100,400 900,141 900,100 858,100" fill="#a5b4fc" opacity="0.35"/><line x1="100" y1="400" x2="900" y2="112" stroke="#4f46e5" stroke-width="2.5"/><text x="480" y="252" font-size="12" fill="#4f46e5" transform="rotate(-20 480 252)">√(g·H) chart line — 200 m/s over 4,000 m ocean (jetliner speed)</text><text x="770" y="152" font-size="11" fill="#4f46e5" opacity="0.8" transform="rotate(-20 770 152)">180–220 m/s band</text><line x1="100" y1="400" x2="900" y2="400" stroke="#333333" stroke-width="1.5"/><line x1="100" y1="100" x2="100" y2="400" stroke="#333333" stroke-width="1.5"/><g font-size="12" fill="#333333" text-anchor="middle"><text x="100" y="420">0</text><text x="200" y="420">2</text><text x="300" y="420">4</text><text x="400" y="420">6</text><text x="500" y="420">8</text><text x="600" y="420">10</text><text x="700" y="420">12</text><text x="800" y="420">14</text><text x="900" y="420">16</text></g><g font-size="12" fill="#333333" text-anchor="end"><text x="92" y="404">0</text><text x="92" y="354">2,000</text><text x="92" y="304">4,000</text><text x="92" y="254">6,000</text><text x="92" y="204">8,000</text><text x="92" y="154">10,000</text><text x="92" y="104">12,000</text></g><text x="500" y="446" font-size="13" fill="#555555" text-anchor="middle">hours after the origin second</text><text x="30" y="250" font-size="13" fill="#555555" text-anchor="middle" transform="rotate(-90 30 250)">great-circle distance (km)</text><text x="112" y="106" font-size="12" font-weight="bold" fill="#333333">The clock — USGS ComCat FDSN: origins as integer ms epoch, keyless GET</text><text x="112" y="122" font-size="12" fill="#333333">Backup clock — EMSC SeismicPortal, same FDSN grammar, current to the hour</text><text x="112" y="138" font-size="12" fill="#333333">The track — NOAA NCEI TTT: Huygens front over 2-arc-minute bathymetry,</text><text x="112" y="154" font-size="12" fill="#333333">arrival times (not heights) — frozen as one pinned solver + grid version</text><text x="112" y="358" font-size="12" font-weight="bold" fill="#333333">origin second (ComCat, integer ms)</text><text x="112" y="372" font-size="11" fill="#555555">Tohoku: 1299822384120 = 05:46:24.120 UTC · 38.297°N 142.373°E · 29 km deep</text><circle cx="100" cy="400" r="6" fill="#4f46e5" stroke="#ffffff" stroke-width="1.5"/><circle cx="145" cy="384" r="5" fill="#4f46e5" stroke="#ffffff" stroke-width="1.5"/><line x1="147" y1="379" x2="180" y2="348" stroke="#a5b4fc" stroke-width="1"/><text x="184" y="330" font-size="12" font-weight="bold" fill="#4f46e5">Pago Pago — Samoa M8.1, 2009-09-29 17:48:10.990 UTC</text><text x="184" y="344" font-size="11" fill="#555555">lag 54 min (nearby trench) · −1.722 m at 18:42 GMT, +1.108 m at 18:48 — 2.8 m swing</text><circle cx="485" cy="250" r="5" fill="#4f46e5" stroke="#ffffff" stroke-width="1.5"/><text x="472" y="226" font-size="12" font-weight="bold" fill="#4f46e5" text-anchor="end">Nawiliwili, Kauai — Tohoku M9.1 (05:46:24.120 UTC)</text><text x="472" y="240" font-size="11" fill="#555555" text-anchor="end">6,000 km · lag 7.7 h · −0.884 m at 13:24 GMT, +0.834 m at 13:50</text><circle cx="890" cy="116" r="5" fill="#4f46e5" stroke="#ffffff" stroke-width="1.5"/><text x="884" y="80" font-size="12" font-weight="bold" fill="#4f46e5" text-anchor="end">Kahului, Maui — Maule (Chile) M8.8, 2010-02-27 06:34:11.530 UTC</text><text x="884" y="94" font-size="11" fill="#555555" text-anchor="end">lag 15.8 h trans-Pacific · 1.055 m MLLW at 22:24 GMT (raw includes tide)</text><text x="500" y="470" font-size="13" font-style="italic" fill="#4f46e5" text-anchor="middle">Fifty-four minutes across a trench; fifteen hours forty-eight minutes across a hemisphere — both on the chart before the water moved.</text></svg>
