<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Helvetica,Arial,sans-serif"><rect width="960" height="480" fill="#ffffff"/><text x="480" y="34" font-size="22" font-weight="bold" fill="#111111" text-anchor="middle">Study 04 — Shear: the tsunami keeps the appointment; the surge keeps none</text><text x="480" y="56" font-size="14" fill="#555555" text-anchor="middle">Same metres, same y-axis — LEFT Tohoku at Nawiliwili (1-min record), RIGHT Sandy at The Battery (6-min). Shape, never magnitude.</text><line x1="485" y1="72" x2="485" y2="390" stroke="#e5e7eb" stroke-width="1.5"/><text x="255" y="84" font-size="15" font-weight="bold" fill="#4f46e5" text-anchor="middle">TRUE FORCING — wave train on the chart</text><text x="715" y="84" font-size="15" font-weight="bold" fill="#dc2626" text-anchor="middle">ADVERSARY — bigger metres, no clock</text><g stroke="#e5e7eb" stroke-width="1"><line x1="70" y1="110" x2="440" y2="110"/><line x1="70" y1="156" x2="440" y2="156"/><line x1="70" y1="202" x2="440" y2="202"/><line x1="70" y1="248" x2="440" y2="248"/><line x1="520" y1="110" x2="890" y2="110"/><line x1="520" y1="156" x2="890" y2="156"/><line x1="520" y1="202" x2="890" y2="202"/><line x1="520" y1="248" x2="890" y2="248"/></g><line x1="70" y1="294" x2="440" y2="294" stroke="#333333" stroke-width="1"/><line x1="520" y1="294" x2="890" y2="294" stroke="#333333" stroke-width="1"/><line x1="70" y1="340" x2="440" y2="340" stroke="#333333" stroke-width="1.5"/><line x1="520" y1="340" x2="890" y2="340" stroke="#333333" stroke-width="1.5"/><g font-size="11" fill="#333333" text-anchor="end"><text x="62" y="344">−1</text><text x="62" y="298">0</text><text x="62" y="252">+1</text><text x="62" y="206">+2</text><text x="62" y="160">+3</text><text x="62" y="114">+4 m</text><text x="512" y="344">−1</text><text x="512" y="298">0</text><text x="512" y="252">+1</text><text x="512" y="206">+2</text><text x="512" y="160">+3</text><text x="512" y="114">+4 m</text></g><g font-size="11" fill="#555555" text-anchor="middle"><text x="70" y="356">0</text><text x="123" y="356">2</text><text x="176" y="356">4</text><text x="229" y="356">6</text><text x="281" y="356">8</text><text x="334" y="356">10</text><text x="387" y="356">12</text><text x="440" y="356">14</text><text x="520" y="356">0</text><text x="582" y="356">6</text><text x="643" y="356">12</text><text x="705" y="356">18</text><text x="767" y="356">24</text><text x="828" y="356">30</text><text x="890" y="356">36</text></g><text x="255" y="374" font-size="12" fill="#555555" text-anchor="middle">hours after origin — 2011-03-11 05:46:24.120 UTC (Tohoku M9.1)</text><text x="705" y="374" font-size="12" fill="#555555" text-anchor="middle">hours from 2012-10-29 00:00 GMT — Sandy at The Battery (8518750)</text><line x1="70" y1="132.9" x2="440" y2="132.9" stroke="#fca5a5" stroke-width="1.5" stroke-dasharray="6 4"/><text x="75" y="127" font-size="11" fill="#dc2626">Sandy's 3.501 m — a ruler alone calls the storm the bigger event</text><line x1="271.7" y1="110" x2="271.7" y2="340" stroke="#4f46e5" stroke-width="1.5" stroke-dasharray="5 4"/><text x="277" y="158" font-size="11" font-weight="bold" fill="#4f46e5">chart appointment</text><text x="277" y="172" font-size="11" fill="#4f46e5">origin + 7.6 h = 13:24 GMT</text><path d="M70,294 L120,293.4 L170,294.6 L220,293.8 L265,294 L271.7,334.7 L283.1,255.6 L293,320 L303,268 L313,310 L323,276 L333,303 L343,282 L353,299 L365,289 L380,296 L400,293 L440,294" fill="none" stroke="#4f46e5" stroke-width="2" stroke-linejoin="round"/><circle cx="271.7" cy="334.7" r="4" fill="#4f46e5"/><circle cx="283.1" cy="255.6" r="4" fill="#4f46e5"/><text x="266" y="334" font-size="11" font-weight="bold" fill="#4f46e5" text-anchor="end">−0.884 m · 13:24</text><text x="292" y="244" font-size="11" font-weight="bold" fill="#4f46e5">+0.834 m · 13:50</text><text x="76" y="226" font-size="12" font-weight="bold" fill="#4f46e5">lag = onset − (origin + chart_time) ≈ 0</text><text x="76" y="242" font-size="11" fill="#333333">minutes-period wave train, onset ON the line — never the peak</text><text x="76" y="258" font-size="11" fill="#333333">Chignik 2021 passes at 0.42 m; onsets sweep the fence in chart order</text><path d="M520,290 L582,281 L643,257 L705,214 L735,183 L760,155 L781,132.9 L800,150 L828,180 L859,208 L890,234 L890,294 L520,294 Z" fill="#fca5a5" opacity="0.4"/><path d="M520,290 L582,281 L643,257 L705,214 L735,183 L760,155 L781,132.9 L800,150 L828,180 L859,208 L890,234" fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linejoin="round"/><circle cx="781" cy="132.9" r="4.5" fill="#dc2626" stroke="#ffffff" stroke-width="1.5"/><text x="781" y="120" font-size="12" font-weight="bold" fill="#dc2626" text-anchor="middle">3.501 m MSL — 01:24 GMT, 30 Oct 2012</text><text x="530" y="308" font-size="12" font-weight="bold" fill="#dc2626">origin second: NONE — nothing to subtract, no chart to keep</text><text x="530" y="322" font-size="11" fill="#333333">a many-hour ramp inside the storm footprint</text><text x="530" y="336" font-size="11" fill="#333333">onsets track the landfall path — no chart order, no wave train</text><text x="480" y="410" font-size="13" font-weight="bold" fill="#333333" text-anchor="middle">SHAPE LOCK — lag = onset − (origin second + chart time), collapsed near zero across the fence, in chart order</text><text x="480" y="428" font-size="12" fill="#555555" text-anchor="middle">Sandy has no origin second to subtract; under the frozen law Chignik's 0.42 m passes and Sandy's 3.501 m fails</text></svg>
