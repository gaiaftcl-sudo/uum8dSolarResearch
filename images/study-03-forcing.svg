<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 480" font-family="Helvetica,Arial,sans-serif"><rect width="960" height="480" fill="#ffffff"/><text x="480" y="34" font-size="22" font-weight="bold" fill="#111" text-anchor="middle">The forcing and its clock — one GOES minute fixes the sunlit cap</text><text x="480" y="56" font-size="14" fill="#555" text-anchor="middle">2003-10-28 X17: X-rays light the whole sunlit hemisphere at once — no track, no travel · zones by solar zenith angle χ</text><text x="250" y="86" font-size="15" font-weight="bold" fill="#333" text-anchor="middle">The clock — GOES XRS 0.1–0.8 nm, 2003-10-28</text><line x1="60" y1="380" x2="440" y2="380" stroke="#e5e7eb"/><line x1="60" y1="300" x2="440" y2="300" stroke="#e5e7eb"/><line x1="60" y1="220" x2="440" y2="220" stroke="#e5e7eb"/><line x1="60" y1="202" x2="440" y2="202" stroke="#4f46e5" stroke-dasharray="3,3" opacity="0.5"/><text x="54" y="384" font-size="11" fill="#555" text-anchor="end">M1</text><text x="54" y="304" font-size="11" fill="#555" text-anchor="end">X1</text><text x="54" y="224" font-size="11" fill="#555" text-anchor="end">X10</text><text x="54" y="206" font-size="11" font-weight="bold" fill="#4f46e5" text-anchor="end">X17</text><line x1="60" y1="420" x2="440" y2="420" stroke="#333"/><text x="60" y="438" font-size="11" fill="#555" text-anchor="middle">09:30</text><text x="187" y="438" font-size="11" fill="#555" text-anchor="middle">10:30</text><text x="313" y="438" font-size="11" fill="#555" text-anchor="middle">11:30</text><text x="440" y="438" font-size="11" fill="#555" text-anchor="middle">12:30 UT</text><line x1="104" y1="120" x2="104" y2="420" stroke="#555" stroke-dasharray="4,3"/><text x="104" y="112" font-size="11" fill="#555" text-anchor="middle">start 09:51</text><line x1="271" y1="112" x2="271" y2="420" stroke="#4f46e5" stroke-width="2"/><text x="271" y="104" font-size="12" font-weight="bold" fill="#4f46e5" text-anchor="middle">max 11:10 UT</text><line x1="301" y1="134" x2="301" y2="420" stroke="#555" stroke-dasharray="4,3"/><text x="318" y="128" font-size="11" fill="#555" text-anchor="middle">end 11:24</text><polyline points="60,412 104,410 180,395 240,360 252,330 262,258 271,202 276,208 285,228 301,252 350,282 440,306" fill="none" stroke="#4f46e5" stroke-width="2.5"/><text x="250" y="452" font-size="12" fill="#333" text-anchor="middle">clock cadence 1 min (SWPC JSON · NCEI xrsf-l2) · response: 1/e rise ~2.5 min → +25 TECU (~30%), persists ~3 h</text><text x="700" y="86" font-size="15" font-weight="bold" fill="#333" text-anchor="middle">The cap — zones at flare-maximum minute 11:10 UT</text><circle cx="700" cy="262" r="158" fill="#555" opacity="0.18"/><circle cx="700" cy="262" r="130" fill="#e5e7eb"/><circle cx="700" cy="262" r="104" fill="#a5b4fc" opacity="0.65"/><circle cx="700" cy="262" r="52" fill="#4f46e5" opacity="0.5"/><circle cx="700" cy="262" r="4" fill="#111"/><line x1="602" y1="124" x2="676" y2="218" stroke="#555" stroke-width="1"/><text x="600" y="120" font-size="12" fill="#333" text-anchor="end">χ&lt;40° — X17 → 25 TECU step</text><line x1="812" y1="132" x2="704" y2="256" stroke="#555" stroke-width="1"/><text x="835" y="112" font-size="12" fill="#333" text-anchor="middle">subsolar point</text><text x="835" y="126" font-size="11" fill="#555" text-anchor="middle">(declination + eq. of time)</text><line x1="612" y1="398" x2="646" y2="332" stroke="#555" stroke-width="1"/><text x="608" y="404" font-size="12" fill="#333" text-anchor="end">40–80°: sunlit — step ~cos χ</text><line x1="818" y1="394" x2="772" y2="350" stroke="#555" stroke-width="1"/><text x="835" y="404" font-size="12" fill="#333" text-anchor="middle">80–100°: terminator — no verdict</text><line x1="700" y1="432" x2="700" y2="421" stroke="#555" stroke-width="1"/><text x="700" y="440" font-size="12" fill="#333" text-anchor="middle">χ&gt;100°: NIGHT — control, must stay silent</text><text x="480" y="470" font-size="12" fill="#555" text-anchor="middle">disk gate: flare disk-center distance ≤ 60° (flloc) · zone edges 40°/80°/100° floored to integer degrees — the sealed reference implementation decides every boundary cell</text></svg>
