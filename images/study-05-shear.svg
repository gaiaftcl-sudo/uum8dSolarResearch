<text x="76" y="143" font-size="11" fill="#4f46e5">sealed window [T_shock, T_shock + 90 min] — every onset lands inside</text>
<text x="260" y="168" text-anchor="middle" font-size="12" font-weight="bold" fill="#4f46e5">longitude-flat: |lag slope| ≤ K (sealed integer bound)</text>
<text x="260" y="330" text-anchor="middle" font-size="12" fill="#333">amplitude ordered Rc^−γ — Kendall pair count, exact integers</text>
<text x="260" y="350" text-anchor="middle" font-size="11" fill="#555">15.7 % at 10 GV · ~15 % polar · onset globally within ~1 h</text>
<text x="720" y="96" text-anchor="middle" font-size="15" font-weight="bold" fill="#dc2626">ADVERSARIES — movers in the ground frame</text>
