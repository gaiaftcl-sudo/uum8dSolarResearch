<text x="560" y="312" font-size="11" fill="#b91c1c">Storm Ciarán 2023-11-02 — 953 hPa low,</text>
<text x="560" y="326" font-size="11" fill="#b91c1c">~20 % raw swing, one weather sector,</text>
<text x="560" y="340" font-size="11" fill="#b91c1c">front ~10 m/s, no L1 shock anywhere</text>
<text x="710" y="380" text-anchor="middle" font-size="11" fill="#555">0.7 %/hPa × 10–30 hPa = 7–20 % raw — the size matches a real FD</text>
<text x="480" y="436" text-anchor="middle" font-size="14" font-weight="bold" fill="#16a34a">SHAPE LOCK — one shock minute, flat in longitude, ordered by rigidity: no 10 m/s front and no 15°/h wave can forge it</text>
<text x="480" y="456" text-anchor="middle" font-size="12" fill="#555">the adversary matches size (7–20 % raw vs FDs 3–15 %), never shape — the verdict reads shape from uncorrected counts + raw pressure</text>
