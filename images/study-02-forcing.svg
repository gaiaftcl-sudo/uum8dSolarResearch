<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 960 480' font-family='Helvetica,Arial,sans-serif'><rect x='0' y='0' width='960' height='480' fill='#ffffff'/><text x='480' y='34' font-size='22' font-weight='bold' fill='#111' text-anchor='middle'>Launch-hole forcing: pad, burn arc, ±3° corridor, and the clock</text><text x='480' y='56' font-size='14' fill='#555' text-anchor='middle'>All computable before the event: LL2 net + pad coordinates + orbital mechanics — no response data enters</text><rect x='40' y='80' width='470' height='350' fill='none' stroke='#e5e7eb' stroke-width='1'/><line x1='123' y1='80' x2='123' y2='430' stroke='#e5e7eb'/><line x1='186' y1='80' x2='186' y2='430' stroke='#e5e7eb'/><line x1='249' y1='80' x2='249' y2='430' stroke='#e5e7eb'/><line x1='311' y1='80' x2='311' y2='430' stroke='#e5e7eb'/><line x1='374' y1='80' x2='374' y2='430' stroke='#e5e7eb'/><line x1='437' y1='80' x2='437' y2='430' stroke='#e5e7eb'/><line x1='40' y1='352' x2='510' y2='352' stroke='#e5e7eb'/><line x1='40' y1='275' x2='510' y2='275' stroke='#e5e7eb'/><line x1='40' y1='198' x2='510' y2='198' stroke='#e5e7eb'/><text x='123' y='443' font-size='9' fill='#555' text-anchor='middle'>125°W</text><text x='186' y='443' font-size='9' fill='#555' text-anchor='middle'>120°W</text><text x='249' y='443' font-size='9' fill='#555' text-anchor='middle'>115°W</text><text x='311' y='443' font-size='9' fill='#555' text-anchor='middle'>110°W</text><text x='374' y='443' font-size='9' fill='#555' text-anchor='middle'>105°W</text><text x='437' y='443' font-size='9' fill='#555' text-anchor='middle'>100°W</text><text x='44' y='356' font-size='9' fill='#555'>28°N</text><text x='44' y='279' font-size='9' fill='#555'>32°N</text><text x='44' y='202' font-size='9' fill='#555'>36°N</text><rect x='391' y='224' width='76' height='206' fill='#e5e7eb' opacity='0.8' stroke='#555' stroke-dasharray='4 3'/><polygon points='140,224 216,224 201,430 125,430' fill='#a5b4fc' opacity='0.3' stroke='#4f46e5' stroke-dasharray='5 4'/><ellipse cx='170' cy='320' rx='85' ry='100' fill='none' stroke='#4f46e5' stroke-width='1.5' stroke-dasharray='6 5' opacity='0.55'/><ellipse cx='170' cy='320' rx='51' ry='78' fill='#4f46e5' opacity='0.28' stroke='#4f46e5'/><line x1='178' y1='224' x2='163' y2='430' stroke='#4f46e5' stroke-width='2'/><line x1='175' y1='258' x2='166' y2='386' stroke='#4f46e5' stroke-width='5' stroke-linecap='round'/><circle cx='178' cy='224' r='5' fill='#111'/><text x='188' y='214' font-size='11' font-weight='bold' fill='#111'>Vandenberg SLC-4E</text><text x='188' y='227' font-size='10' fill='#555'>34.632°N, 120.611°W (LL2 pad field)</text><text x='52' y='98' font-size='11' fill='#333'>2nd-stage burn arc: 200–700 km altitude</text><text x='52' y='111' font-size='10' fill='#555'>2023-07-20 04:09 UTC burn at 286 km — the F-region peak, 70% quench</text><line x1='150' y1='116' x2='174' y2='254' stroke='#555' stroke-width='1'/><text x='58' y='253' font-size='10' fill='#4f46e5'>±3° corridor,</text><text x='58' y='265' font-size='10' fill='#4f46e5'>frozen 1°×1° cells</text><line x1='221' y1='300' x2='248' y2='294' stroke='#555' stroke-width='1'/><text x='252' y='291' font-size='11' fill='#333'>hole ~900 km across</text><text x='252' y='304' font-size='10' fill='#555'>10–70% depletion, heals 1–3 h</text><line x1='249' y1='332' x2='256' y2='321' stroke='#555' stroke-width='1'/><text x='252' y='344' font-size='11' fill='#333'>SAW ring 629–726 m/s</text><text x='252' y='357' font-size='10' fill='#555'>~1500 km, period 10.28 min (FORMOSAT-5 2017-08-24)</text><line x1='216' y1='418' x2='391' y2='418' stroke='#555' stroke-dasharray='3 3'/><text x='303' y='412' font-size='10' fill='#555' text-anchor='middle'>+20° longitude, same UT, same maglat band</text><text x='429' y='203' font-size='9' fill='#555' text-anchor='middle'>control corridor — sealed rule:</text><text x='429' y='215' font-size='9' fill='#555' text-anchor='middle'>larger cell count wins, ties eastward</text><text x='735' y='92' font-size='13' font-weight='bold' fill='#333' text-anchor='middle'>The clock: one launch, end to end</text><line x1='560' y1='105' x2='560' y2='415' stroke='#333' stroke-width='2'/><rect x='553' y='190' width='14' height='75' fill='#a5b4fc' opacity='0.6'/><text transform='rotate(-90 546 227)' x='546' y='227' font-size='9' fill='#4f46e5' text-anchor='middle'>bins +1..+18</text><line x1='553' y1='110' x2='567' y2='110' stroke='#555' stroke-width='2'/><text x='576' y='114' font-size='12' fill='#333'>T−1h — freeze: LL2 net (precision: Minute)</text><text x='576' y='127' font-size='10' fill='#555'>±3° corridor + control sealed as 1°×1° cell lists</text><line x1='553' y1='150' x2='567' y2='150' stroke='#111' stroke-width='3'/><text x='576' y='154' font-size='12' font-weight='bold' fill='#111'>T+0 — liftoff second (GCAT) = bin 0</text><text x='576' y='167' font-size='10' fill='#555'>2023-07-20 04:09 UTC; net-to-actual slip over 10 min = VOID-by-slip</text><line x1='553' y1='190' x2='567' y2='190' stroke='#4f46e5' stroke-width='2'/><text x='576' y='194' font-size='12' fill='#333'>T+5 min — bin +1: graded window opens</text><text x='576' y='207' font-size='10' fill='#555'>SAW ring launches at 629–726 m/s</text><line x1='553' y1='228' x2='567' y2='228' stroke='#4f46e5' stroke-width='2'/><text x='576' y='232' font-size='12' fill='#333'>T+15 min — bin +3: expected onset window ends</text><text x='576' y='245' font-size='10' fill='#555'>hole opens T+5–15 min: ~900 km, 10–70% depletion</text><line x1='553' y1='265' x2='567' y2='265' stroke='#4f46e5' stroke-width='2'/><text x='576' y='269' font-size='12' fill='#333'>T+90 min — bin +18: depletion window closes</text><text x='576' y='282' font-size='10' fill='#555'>WIN needs one bin with 100×statistic ≤ −T_stratum×baseline</text><line x1='553' y1='303' x2='567' y2='303' stroke='#16a34a' stroke-width='2'/><text x='576' y='307' font-size='12' fill='#333'>T+180 min — bin +36: recovery deadline</text><text x='576' y='320' font-size='10' fill='#555'>2 consecutive bins at or above −R; refill 1–3 h</text><line x1='554' y1='334' x2='566' y2='328' stroke='#333'/><line x1='554' y1='340' x2='566' y2='334' stroke='#333'/><text x='576' y='337' font-size='9' fill='#555'>(scale break)</text><line x1='553' y1='350' x2='567' y2='350' stroke='#555' stroke-width='2'/><text x='576' y='354' font-size='12' fill='#333'>T+24 h — corridor cell list finalizes</text><text x='576' y='367' font-size='10' fill='#555'>Space-Track refinement iff element sets exist; never changes after</text><line x1='553' y1='395' x2='567' y2='395' stroke='#555' stroke-width='2'/><text x='576' y='399' font-size='12' fill='#333'>T+7 d — grading reads frozen lists only</text><text x='576' y='412' font-size='10' fill='#555'>newest Madrigal kindat 3500 file; absent = VOID-by-data</text></svg>
